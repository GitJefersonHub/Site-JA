<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Painel do Usuário</title>
  <link rel="stylesheet" href="css/painel.css">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>
  <div class="painel-container">
    <h2 id="boasVindas"></h2>
    <div class="info-usuario">
      <p class="p1" id="infoNome"></p>
      <p class="p1" id="infoMatricula"></p>
      <p class="p1" id="infoLocalizacao"></p>
      <p class="p1" id="infoPosto"></p>
    </div>

    <p class="p2">🔐 Lembre-se: Guarde suas informações de login.</p>
    <div class="actions">
      <button class="btn-ponto" onclick="registrar()">Registrar</button>
      <h2 id="contadorFechamento" style="font-weight: bold; color: #d9534f;"></h2>
      <button class="btn-relatorios" onclick="window.location.href='relatorios.html'">Relatórios</button>
      <button class="btn-ESE" onclick="editarPerfil()">Editar / Salvar / Excluir</button>

      <div id="formCadastro" class="form-cadastro"></div>
      <div id="formEditar" class="form-editar" style="display: none;">
        <label for="editNome">Nome:</label>
        <input type="text" id="editNome">
        <label for="editMatricula">Matrícula:</label>
        <input type="text" id="editMatricula">
        <label for="editLocalizacao">Local:</label>
        <input type="text" id="editLocalizacao">
        <label for="editPosto">Posto:</label>
        <input type="text" id="editPosto">
        <br>
        <button class="btn-salvar" onclick="salvarPerfil()">Salvar</button>
        <button class="btn-excluir" onclick="excluir()">Excluir</button>
      </div>

      <button class="btn-sair" onclick="sair()">Sair</button>
      <button class="btn-lista" onclick="imprimirLista()">Lista</button>

      <!-- Tabelas de Registros -->
      <div id="tabelaPonto" class="tabela-registros"></div>
      <div id="tabelaQRCode" class="tabela-registros"></div>
      <div id="tabelaResumo" class="tabela-registros"></div>
    </div>
  </div>

  <!-- Modal de opções de registro -->
  <div id="modalRegistro" class="modal-registro">
    <div class="modal-conteudo modal-opcoes">
      <div id="reader" class="leitor-qr">
        <p id="leituraStatus" class="leitura-status">Aguardando leitura…</p>
      </div>
      <h3>Registrar como:</h3>
      <button onclick="registrarPonto()">Registro Móvel</button>
      <button onclick="registrarQRCode()">Registro QR Code</button>
      <button onclick="abrirModalResumo()">Registro Resumo</button>
      <button onclick="fecharModal()">Fechar</button>
    </div>
  </div>

  <!-- Modal de observação -->
  <div id="modalObservacao" class="modal-registro">
    <div class="modal-conteudo modal-observacao">
      <h3>Observação:</h3>
      <textarea id="campoObservacao" maxlength="90" rows="3" class="campo-observacao"></textarea>
      <p id="contadorObservacao" class="contador-observacao">90 restantes</p>
      <button onclick="confirmarObservacao()">Confirmar</button>
      <button onclick="cancelarObservacao()">Cancelar</button>
    </div>
  </div>

  <!-- Modal de resumo -->
  <div id="modalResumo" class="modal-registro">
    <div class="modal-conteudo modal-resumo">
      <h3>Resumo:</h3>
      <textarea id="campoResumo" maxlength="2000" rows="4" class="campo-resumo"></textarea>
      <p id="contadorResumo" class="contador-resumo">2000 restantes</p>
      <button onclick="confirmarResumo()">Confirmar</button>
      <button onclick="cancelarResumo()">Cancelar</button>
    </div>
  </div>

  <script src="js/rondas/main.js"></script>
  <script src="js/rondas/botaoQR.js"></script>
  <script src="js/rondas/editarPerfil.js"></script>
  <script src="js/rondas/lista.js"></script>
  <script src="js/rondas/excluir.js"></script>
  <script src="js/rondas/sair.js"></script>
</body>

</html>
