<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios</title>

  <!-- Estilos -->
  <link rel="stylesheet" href="css/relatorios.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&display=swap"
    rel="stylesheet">
  <link rel="icon" href="data:,">
</head>

<body>
  <main>
    <!-- Área para renderização dinâmica das tabelas -->
    <section id="tabelaPonto"></section>
    <section id="tabelaQRCode"></section>
    <section id="tabelaResumo"></section>
  </main>

  <!-- Inicialização de contexto -->
  <script>
    (function initRelatoriosContext() {
      const usuarioLogado = localStorage.getItem('usuarioLogado');
      const dadosUsuario = JSON.parse(localStorage.getItem('dadosUsuario') || '{}');

      // Proteção de acesso
      if (!usuarioLogado || !dadosUsuario || !dadosUsuario.nome || !dadosUsuario.matricula || !dadosUsuario.posto || !dadosUsuario.localizacao) {
        alert('Acesso inválido. Faça login novamente.');
        localStorage.removeItem('usuarioLogado');
        localStorage.removeItem('dadosUsuario');
        location.replace('rondasLogin.html');
        return;
      }

      // Expor globalmente para os scripts de relatório
      window.dadosUsuario = dadosUsuario;
    })();
  </script>

  <!-- Scripts principais -->
  <script src="js/rondas/relBase.js" defer></script>
  <script src="js/rondas/relBasePonto.js" defer></script>
  <script src="js/rondas/relQRCode.js" defer></script>
  <script src="js/rondas/relCriarTabPonto.js" defer></script>
  <script src="js/rondas/relCriarJanImpressao.js" defer></script>
  <script src="js/rondas/relCriarTabResumo.js" defer></script>
 
</body>

</html>
